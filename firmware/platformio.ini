; ESP32 Live Portfolio Hub
; PlatformIO configuration for ESP32-2432S028R (Cheap Yellow Display)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/cu.usbserial-110

; TFT_eSPI configuration for ILI9341 (built-in TFT_eSPI setup)
build_flags =
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTOUCH_CS=33
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    ; Memory optimization
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0

lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    bblanchon/ArduinoJson@^7.0.0

; Partition scheme with more program space
board_build.partitions = min_spiffs.csv

; Monitor filters for clean output
monitor_filters = colorize, esp32_exception_decoder
